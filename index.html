<!DOCTYPE html><html lang="kk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ҚР Ұлттық кітапханасы </title><style>  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Google+Sans:wght@400;500;700&display=swap');  :root{    --bg-1:#063836;    --bg-2:#005C5B;    --bg-3:#00828A;    --text:#F6FBF8;    --text-dim:rgba(246,251,248,0.68);    --accent:#9FF6E8;    --accent-strong:#7CF2DD;    --card-bg:rgba(255,255,255,0.055);    --card-bg-2:rgba(255,255,255,0.08);    --card-border:rgba(255,255,255,0.12);    --shadow: 0 20px 60px rgba(0,0,0,0.35);  }  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }  html,body{ margin:0; padding:0; }  body{    font-family:'Inter','Google Sans',-apple-system,'SF Pro Display','Segoe UI',Roboto,sans-serif;    color:var(--text);    background: radial-gradient(120% 120% at 12% 8%, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);    background-attachment: fixed;    overflow-x:hidden;    -webkit-font-smoothing:antialiased;    text-rendering: optimizeLegibility;  }  /* ===== Scroll container ===== */  .deck{    height:100vh;    overflow-y:auto;    scroll-snap-type:y mandatory;    scroll-behavior:smooth;  }  .slide{    min-height:100vh;    width:100%;    display:flex;    flex-direction:column;    align-items:center;    justify-content:center;    scroll-snap-align:start;    scroll-snap-stop:always;    padding: 9vh 7vw;    position:relative;  }  .slide-inner{    width:100%;    max-width:1180px;    margin:0 auto;    display:flex;    flex-direction:column;    align-items:center;    gap:42px;  }  /* ===== Header (icon + title) ===== */  .slide-header{    display:flex;    flex-direction:column;    align-items:center;    gap:18px;    text-align:center;  }  .slide-eyebrow{    font-size:13px;    letter-spacing:.22em;    text-transform:uppercase;    color:var(--text-dim);    font-weight:600;  }  .icon-badge{    width:64px; height:64px;    border-radius:20px;    display:flex; align-items:center; justify-content:center;    background:linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04));    border:1px solid rgba(255,255,255,0.18);    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 12px 30px rgba(0,0,0,0.25);    backdrop-filter: blur(6px);  }  .icon-badge svg{ width:30px; height:30px; stroke:var(--text); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }  .slide-title{    font-size:clamp(28px,4vw,46px);    font-weight:800;    letter-spacing:-0.01em;    line-height:1.18;    max-width:880px;    margin:0;  }  .slide-sub{    font-size:clamp(14px,1.6vw,18px);    color:var(--text-dim);    font-weight:500;    max-width:760px;    line-height:1.6;    margin:0;  }  /* ===== Stats row ===== */  .stats-row{    display:flex;    flex-wrap:wrap;    justify-content:center;    gap:18px;    width:100%;  }  .stat-pill{    background:var(--card-bg-2);    border:1px solid var(--card-border);    border-radius:18px;    padding:18px 28px;    display:flex; flex-direction:column; align-items:center; gap:6px;    min-width:150px;    backdrop-filter: blur(10px);  }  .stat-pill .num{    font-size:clamp(22px,2.6vw,32px);    font-weight:800;    color:var(--accent);    letter-spacing:-0.01em;    line-height:1.1;  }  .stat-pill .lbl{    font-size:13px;    color:var(--text-dim);    text-align:center;    font-weight:500;    line-height:1.4;  }  /* ===== Cards grid ===== */  .cards{    display:grid;    grid-template-columns:repeat(2,minmax(0,1fr));    gap:24px;    width:100%;  }  .cards.cols-1{ grid-template-columns:1fr; max-width:760px; }  .cards.cols-3{ grid-template-columns:repeat(3,minmax(0,1fr)); }  .card{    background:var(--card-bg);    border:1px solid var(--card-border);    border-radius:22px;    padding:28px 30px;    backdrop-filter: blur(10px);    box-shadow: var(--shadow);    display:flex;    flex-direction:column;    gap:14px;  }  .card-head{    display:flex;    align-items:center;    gap:12px;  }  .card-icon{    width:38px; height:38px;    border-radius:12px;    flex:none;    display:flex; align-items:center; justify-content:center;    background:rgba(255,255,255,0.10);    border:1px solid rgba(255,255,255,0.14);  }  .card-icon svg{ width:19px; height:19px; stroke:var(--accent); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }  .card-heading{    font-size:18px;    font-weight:700;    line-height:1.35;    margin:0;  }  .card-intro{    font-size:14.5px;    color:var(--text-dim);    line-height:1.65;    margin:0;  }  .card-list{    list-style:none;    margin:0; padding:0;    display:flex; flex-direction:column;    gap:10px;  }  .card-list > li{    font-size:14.5px;    line-height:1.65;    padding-left:18px;    position:relative;    color:rgba(246,251,248,0.92);  }  .card-list > li::before{    content:"";    position:absolute;    left:0; top:0.62em;    width:6px; height:6px;    border-radius:50%;    background:var(--accent);    opacity:0.85;  }  .card-list strong{    color:var(--accent);    font-weight:700;  }  .sub-list{    list-style:none;    margin:8px 0 0 0; padding:0 0 0 20px;    display:flex; flex-direction:column;    gap:8px;    border-left:1px solid rgba(255,255,255,0.14);    margin-left:3px;  }  .sub-list > li{    font-size:13.5px;    line-height:1.6;    padding-left:14px;    position:relative;    color:rgba(246,251,248,0.82);  }  .sub-list > li::before{    content:"";    position:absolute;    left:0; top:0.6em;    width:5px; height:5px;    border-radius:50%;    background:rgba(159,246,232,0.55);  }  .sub-list strong{ color:var(--accent); font-weight:700; }  /* ===== Charts ===== */  .chart-wrap{    width:100%;    display:flex;    flex-direction:column;    align-items:center;    gap:28px;  }  .chart-row{    display:flex;    gap:40px;    align-items:center;    justify-content:center;    flex-wrap:wrap;    width:100%;  }  .donut-legend{    display:flex; flex-direction:column; gap:10px;  }  .donut-legend .item{ display:flex; align-items:center; gap:10px; font-size:14px; }  .donut-legend .swatch{ width:14px; height:14px; border-radius:4px; flex:none; }  .bars{    width:100%; max-width:640px;    display:flex; flex-direction:column; gap:16px;  }  .bar-row{ display:flex; flex-direction:column; gap:6px; }  .bar-row .meta{ display:flex; justify-content:space-between; font-size:13.5px; color:var(--text-dim); }  .bar-track{ width:100%; height:12px; border-radius:8px; background:rgba(255,255,255,0.08); overflow:hidden; }  .bar-fill{ height:100%; border-radius:8px; background:linear-gradient(90deg,#5be7d2,#9ff6e8); }  /* ===== Cover & closing slides ===== */  .cover .slide-inner{ gap:30px; }  .cover .icon-badge{ width:96px; height:96px; border-radius:28px; }  .cover .icon-badge svg{ width:46px; height:46px; }  .cover .slide-title{ font-size:clamp(34px,5.4vw,64px); }  .cover-org{    font-size:15px; letter-spacing:.3em; text-transform:uppercase;    color:var(--accent); font-weight:700;  }  .cover-meta{    display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:10px;  }  .meta-chip{    border:1px solid var(--card-border);    background:var(--card-bg);    border-radius:999px;    padding:8px 18px;    font-size:13px;    color:var(--text-dim);  }  .closing .slide-title{ font-size:clamp(30px,4.6vw,52px); }  /* ===== Page index badge ===== */  .page-badge{    position:absolute;    top:28px; right:32px;    font-size:12px;    letter-spacing:.18em;    color:var(--text-dim);    font-weight:600;  }  /* ===== Navigation controls ===== */  .nav-controls{    position:fixed;    bottom:22px; left:50%;    transform:translateX(-50%);    display:flex; align-items:center; gap:14px;    background:rgba(6,30,29,0.55);    border:1px solid rgba(255,255,255,0.12);    border-radius:999px;    padding:10px 16px;    backdrop-filter: blur(14px);    z-index:50;    box-shadow:0 12px 40px rgba(0,0,0,0.35);  }  .nav-btn{    width:38px; height:38px;    border-radius:50%;    border:1px solid rgba(255,255,255,0.18);    background:rgba(255,255,255,0.06);    color:var(--text);    display:flex; align-items:center; justify-content:center;    cursor:pointer;    transition:.15s ease;  }  .nav-btn:hover{ background:rgba(255,255,255,0.16); }  .nav-btn svg{ width:18px; height:18px; stroke:var(--text); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }  .nav-counter{    font-size:13px; font-weight:600; color:var(--text-dim);    min-width:64px; text-align:center;    font-variant-numeric: tabular-nums;  }  /* ===== progress bar at top ===== */  .progress-bar{    position:fixed; top:0; left:0; height:3px;    background:linear-gradient(90deg,#5be7d2,#9ff6e8);    z-index:60;    transition:width .25s ease;  }  @media (max-width: 860px){    .cards{ grid-template-columns:1fr; }    .cards.cols-3{ grid-template-columns:1fr; }    .slide{ padding:8vh 6vw; }    .chart-row{ flex-direction:column; gap:24px; }  }/* ===== Visit card / contact panel ===== */.visit-card{width:100%;max-width:760px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:26px;padding:26px 28px;backdrop-filter:blur(10px);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:20px;}.vc-director{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}.vc-avatar{width:56px;height:56px;border-radius:18px;flex:none;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,0.18);}.vc-avatar svg{width:26px;height:26px;stroke:var(--accent);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}.vc-director-info{flex:1;min-width:160px;text-align:left;}.vc-director-name{font-size:17px;font-weight:700;}.vc-director-role{font-size:13px;color:var(--text-dim);margin-top:2px;}.vc-director-link{display:flex;align-items:center;gap:8px;border:1px solid var(--card-border);background:var(--card-bg-2);border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;color:var(--text);text-decoration:none;transition:.15s ease;white-space:nowrap;}.vc-director-link svg{width:15px;height:15px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}.vc-director-link:hover{background:rgba(255,255,255,0.16);}.vc-divider{height:1px;background:rgba(255,255,255,0.12);}.vc-grid{display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:10px;}.vc-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:14px;background:rgba(255,255,255,0.035);border:1px solid transparent;text-decoration:none;color:inherit;text-align:left;transition:.15s ease;}a.vc-row:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.14);}.vc-text{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}.vc-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}.vc-value{font-size:14px;font-weight:600;color:var(--text);overflow-wrap:anywhere;word-break:break-word;}a.vc-row:hover .vc-value{color:var(--accent);}.vc-go{flex:none;opacity:.5;}.vc-go svg{width:14px;height:14px;stroke:var(--text-dim);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}.vc-row.vc-address{grid-column:1 / -1;align-items:flex-start;}/* ===== Language toggle ===== */.lang-toggle{position:fixed;top:20px;left:24px;display:flex;gap:4px;background:rgba(6,30,29,0.55);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:5px;backdrop-filter:blur(14px);z-index:55;box-shadow:0 12px 40px rgba(0,0,0,0.35);}.lang-btn{border:none;background:transparent;color:var(--text-dim);font-size:12px;font-weight:700;letter-spacing:.04em;padding:8px 15px;border-radius:999px;cursor:pointer;transition:.15s ease;font-family:inherit;}.lang-btn.active{background:var(--accent);color:#06302e;}.lang-btn:not(.active):hover{background:rgba(255,255,255,0.1);color:var(--text);}@media (max-width: 860px){.vc-grid{grid-template-columns:1fr;}.visit-card{padding:20px;}.vc-row.vc-address{grid-column:auto;}.vc-director{justify-content:center;text-align:center;}.vc-director-info{text-align:center;}}</style></head><body><div class="progress-bar" id="progressBar" style="width:0%"></div><div class="lang-toggle" id="langToggle"><button class="lang-btn active" data-lang="kk" type="button">ҚАЗ</button><button class="lang-btn" data-lang="en" type="button">ENG</button></div><!-- Icon sprite --><svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true"><defs><symbol id="i-library" viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M5 21V9l7-5 7 5v12"/><path d="M9 21v-6h6v6"/></symbol><symbol id="i-id-card" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="2"/><path d="M5 17c0-1.6 1.5-2.7 3.5-2.7s3.5 1.1 3.5 2.7"/><path d="M13.5 9h6M13.5 13h6"/></symbol><symbol id="i-archive" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="4" y="8" width="16" height="12" rx="1"/><path d="M10 13h4"/></symbol><symbol id="i-scroll" viewBox="0 0 24 24"><path d="M7 4a2 2 0 1 0 0 4h11V4z"/><path d="M17 20a2 2 0 1 0 0-4H6v4z"/><path d="M7 8v8"/><path d="M17 8v8"/></symbol><symbol id="i-inbox" viewBox="0 0 24 24"><path d="M21 12v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6"/><path d="M3 12h5l2 3h4l2-3h5"/><path d="M12 3v8"/><path d="M9 8l3 3 3-3"/></symbol><symbol id="i-book" viewBox="0 0 24 24"><path d="M3 4.8C3 3.8 3.8 3 6 3c2.6 0 4.5 1 5.5 2v14.5C10.5 18.5 8.6 17.5 6 17.5c-1.6 0-3 .4-3 1.3z"/><path d="M21 4.8c0-1-1-1.8-3-1.8-2.6 0-4.5 1-5.5 2v14.5c1-1 2.9-2 5.5-2 1.6 0 3 .4 3 1.3z"/></symbol><symbol id="i-graduation" viewBox="0 0 24 24"><path d="M22 9 12 5 2 9l10 4 10-4z"/><path d="M6 11.4V16c0 1.7 2.7 3 6 3s6-1.3 6-3v-4.6"/><path d="M22 9v6"/></symbol><symbol id="i-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.7 2.5 4.2 5.7 4.2 9s-1.5 6.5-4.2 9"/><path d="M12 3c-2.7 2.5-4.2 5.7-4.2 9s1.5 6.5 4.2 9"/></symbol><symbol id= жыл","valueEn":"5 years","label":"билет мерзімі","labelEn":"card validity"}]},{"num":2,"icon":"archive","title":"Ұлттық кітапхананың қор құрылымы","titleEn":"Structure of the National Library's Collection","blocks":[{"heading":"Ұлттық кітапхананың жалпы қоры","headingEn":"General collection of the National Library","intro":null,"items":[{"kk":"<strong>Жалпы көлемі:</strong> 7 миллионнан астам басылым бірлігі.","en":"<strong>Total volume:</strong> more than 7 million publication units."},{"kk":"<strong>Тілдер:</strong> Әлем халықтарының 123 тілінде.","en":"<strong>Languages:</strong> in 123 languages of the world's peoples."},{"kk":"<strong>Қор мазмұны:</strong> Заманауи құжаттар, қолжазбалар, алғашқы баспалар, ноталы-музыкалық туындылар және күйтабақтар.","en":"<strong>Collection contents:</strong> contemporary documents, manuscripts, early printed editions, sheet music, and gramophone records."},{"kk":"<strong>Сақтау аумағы:</strong> 8 764 ш. м.","en":"<strong>Storage area:</strong> 8,764 m²."}]},{"heading":"Ұлттық және архивтік қор","headingEn":"National and archival collections","intro":null,"items":[{"kk":"<strong>Ұлттық қор:</strong> 1934 жылы құрылған, жалпы саны 1 млн-нан астам дана.","en":"<strong>National collection:</strong> established in 1934, totaling more than 1 million copies."},{"kk":"<strong>Архивтік қор:</strong> 1984 жылы міндетті дана негізінде құрылған. Қазіргі таңда 183 мыңнан аса аталым бар.","en":"<strong>Archival collection:</strong> established in 1984 on the basis of legal deposit copies, now holding more than 183,000 titles."},{"kk":"<strong>Қамтитын бағыттары:</strong> Қазақстанның тарихы, экономикасы, саясаты, көркем әдебиеті, оқулықтар және ТМД әдебиеттері.","en":"<strong>Subject coverage:</strong> Kazakhstan's history, economy, politics, and fiction, plus textbooks and CIS literature."}]},{"heading":"Жүйелі және форматты қор","headingEn":"Systematic and special-format collection","intro":null,"items":[{"kk":"<strong>Негізгі қор көлемі:</strong> 3 миллионнан астам бірлік.","en":"<strong>Core collection size:</strong> more than 3 million units."},{"kk":"<strong>Құрамында:</strong>","en":"<strong>Includes:</strong>","sub":[{"kk":"7 мыңға жуық географиялық карталар.","en":"Nearly 7,000 geographic maps."},{"kk":"714 мыңнан астам авторефераттар.","en":"More than 714,000 dissertation abstracts."}]}]},{"heading":"Мерзімді басылымдар қоры","headingEn":"Periodicals collection","intro":null,"items":[{"kk":"<strong>Қалыптасу кезеңі:</strong> 1940 жылдан бастап жинақталған.","en":"<strong>Formation period:</strong> accumulated since 1940."},{"kk":"<strong>Жалпы саны:</strong> 14 038 аталым / 2 874 299 дана.","en":"<strong>Total:</strong> 14,038 titles / 2,874,299 copies."},{"kk":"<strong>Құрамы:</strong> Отандық (республикалық, облыстық, аудандық) газет-журналдар, ведомстволық еңбектер, ресейлік және шетелдік мерзімді басылымдар.","en":"<strong>Composition:</strong> domestic (republican, regional, district) newspapers and magazines, departmental publications, and Russian and foreign periodicals."}]},{"heading":"«Мәдени мұра» бағдарламасының депозитарийі","headingEn":"Depository of the \"Cultural Heritage\" program","intro":"Кітапхана — мемлекеттік бағдарлама аясында шыққан бірегей сериялардың сақтау орны:","introEn":"The library holds unique series published under the state program, including:","items":[{"kk":"<strong>«Бабалар сөзі»</strong> — 100 томдық қазақ фольклоры.","en":"<strong>\"Babalar Sozi\" (Words of the Ancestors)</strong> — a 100-volume collection of Kazakh folklore."},{"kk":"<strong>Философия және тарих:</strong> 20 томдық «Қазақ халқының философиялық мұрасы», «Әлемдік философиялық мұра», 14 томдық «Тарих – адамзат ақыл-ойының қазынасы».","en":"<strong>Philosophy and history:</strong> the 20-volume \"Philosophical Heritage of the Kazakh People,\" \"World Philosophical Heritage,\" and the 14-volume \"History — the Treasury of Human Thought.\""},{"kk":"<strong>Әдебиет және құқық:</strong> 20 томдық «Әдеби жәдігерлер», 10 томдық «Қазақ әдебиетінің тарихы», «Қазақтың ата-заңдары».","en":"<strong>Literature and law:</strong> the 20-volume \"Literary Treasures,\" the 10-volume \"History of Kazakh Literature,\" and \"Traditional Kazakh Laws.\""},{"kk":"<strong>Әлемдік классика:</strong> Қазақ тіліне аударылған саясаттану, әлеуметтану антологиялары мен «Әлем әдебиеті кітапханасы» сериялары.","en":"<strong>World classics:</strong> political-science and sociology anthologies translated into Kazakh, plus the \"World Literature Library\" series."}]}],"stats":[{"value":"7 млн+","valueEn":"7M+","label":"басылым бірлігі","labelEn":"publication units"},{"value":"123","valueEn":"123","label":"тіл","labelEn":"languages"},{"value":"8 764 м²","valueEn":"8,764 m²","label":"сақтау аумағы","labelEn":"storage area"}]},{"num":3,"icon":"scroll","title":"Сирек кітаптар мен қолжазбалар қоры","titleEn":"Rare Books and Manuscripts Collection","blocks":[{"heading":"Сирек кітаптар мен қолжазбалар қоры","headingEn":"Rare Books and Manuscripts Collection","intro":null,"items":[{"kk":"<strong>Жалпы көлемі:</strong> ~40 мың құжат (1000-нан астамы – қолжазба).","en":"<strong>Total volume:</strong> approximately 40,000 documents (more than 1,000 of which are manuscripts)."},{"kk":"<strong>Мазмұны:</strong> ХІІ-ХІХ ғғ. тарих, география, медицина, философия, лингвистика бойынша шығыс қолжазбалары.","en":"<strong>Contents:</strong> 12th–19th century Oriental manuscripts on history, geography, medicine, philosophy, and linguistics."},{"kk":"<strong>Тілдері:</strong> Араб, парсы, түркі, түрік, өзбек, шағатай және т.б..","en":"<strong>Languages:</strong> Arabic, Persian, Turkic, Turkish, Uzbek, Chagatai, and others."},{"kk":"<strong>Ең көне жәдігер:</strong> XII ғасырдың Құраны (куфи жазуымен жазылған, мұқабасы бұзау терісінен).","en":"<strong>Oldest artifact:</strong> a 12th-century Qur'an, written in Kufic script and bound in calfskin."},{"kk":"<strong>Ең үлкен Құран:</strong> XVIII ғасырға тиесілі (1042 бет, салмағы 9,1 кг, парсыша жолма-жол аудармасы бар).","en":"<strong>Largest Qur'an:</strong> dating from the 18th century (1,042 pages, weighing 9.1 kg, with an interlinear Persian translation)."}]},{"heading":"ЮНЕСКО-ның «Әлем жады» тізіміндегі қолжазбалар (2003 ж.)","headingEn":"Manuscripts in UNESCO's \"Memory of the World\" Register (2003)","intro":"ЮНЕСКО тізіміне кітапханадан 5 бірегей қолжазба енген:","introEn":"Five unique manuscripts from the library are included in the UNESCO register:","items":[{"kk":"<strong>«Насабнама» (1687-1688 жж.):</strong> Қожа Ахмет Ясауидің ата-тегі туралы шежіре (шағатай тілінде, рулонды форматта).","en":"<strong>\"Nasabnama\" (1687–1688):</strong> a genealogical chronicle of Khoja Ahmed Yasawi's lineage, in Chagatai, in scroll format."},{"kk":"<strong>«Рисала (Мират ул-қулуб)» (ХVІ-ХVІІ ғғ.):</strong> Ясауия тариқатының жол-жоралғысы мен ұлағатты сөздері (проза).","en":"<strong>\"Risala (Mirat ul-Qulub)\" (16th–17th c.):</strong> the customs and wise sayings of the Yasawiyya order, in prose."},{"kk":"<strong>«Хикмет хазрети» (ХVІІІ ғ.):</strong> Түркі ақындарының өлеңдер жинағы.","en":"<strong>\"Hikmet Hazreti\" (18th c.):</strong> a collection of poems by Turkic poets."},{"kk":"<strong>«Диуани хикмет» (ХІX ғ.):</strong> Қожа Ахмет Ясауидің 88 хикметінен тұратын қолжазба.","en":"<strong>\"Diwani Hikmet\" (19th c.):</strong> a manuscript containing 88 hikmets (wisdom verses) by Khoja Ahmed Yasawi."},{"kk":"<strong>«Хикмет Хазірет Сұлтан әл-Ғарифин» (ХVІ ғ.):</strong> Сүлеймен Бақырғанидің сопылық философияға арналған поэзиялық еңбегі.","en":"<strong>\"Hikmet Hazret Sultan al-Garifin\" (16th c.):</strong> a poetic work on Sufi philosophy by Suleiman Bakyrgani."}]},{"heading":"Қазақтың алғашқы баспа кітаптары","headingEn":"The first printed Kazakh books","intro":"Қорда сақталған тарихи маңызды тұңғыш басылымдар:","introEn":"Historically significant first editions held in the collection:","items":[{"kk":"<strong>«Ер Тарғын»</strong> (1862)","en":"<strong>\"Er Targyn\"</strong> (1862)"},{"kk":"<strong>«Шежіре-и түрік»</strong> (1871)","en":"<strong>\"Shezhire-i Turik\"</strong> (1871)"},{"kk":"Ы. Алтынсариннің <strong>«Шәрәйт-ул-Ислам»</strong> (1884), <strong>«Хрестоматия»</strong> (1899)","en":"Y. Altynsarin's <strong>\"Sharait-ul-Islam\"</strong> (1884) and <strong>\"Khrestomatiya\" (Reader)</strong> (1899)"},{"kk":"<strong>«Қыз Жібек хикаясы»</strong> (1899)","en":"<strong>\"The Tale of Kyz Zhibek\"</strong> (1899)"},{"kk":"Ш. Уәлихановтың <strong>Шығармалар жинағы</strong> (1904)","en":"Sh. Walikhanov's <strong>Collected Works</strong> (1904)"},{"kk":"Абай Құнанбайұлының тұңғыш <strong>Өлеңдер жинағы</strong> (1909)","en":"Abai Kunanbaiuly's first <strong>Collection of Poems</strong> (1909)"}]},{"heading":"Алғашқы мерзімді басылымдар (1911–1949 жж.)","headingEn":"Early periodicals (1911–1949)","intro":null,"items":[{"kk":"<strong>Қор көлемі:</strong> Қазақ тіліндегі 92 аталым журнал және 54 аталым газет.","en":"<strong>Collection size:</strong> 92 magazine titles and 54 newspaper titles in Kazakh."},{"kk":"<strong>Қаріптері:</strong> Төте жазу, латын және кирилл графикасымен шыққан.","en":"<strong>Scripts:</strong> published in Tote (Arabic-based), Latin, and Cyrillic script."},{"kk":"<strong>Басты басылымдар:</strong>","en":"<strong>Key publications:</strong>","sub":[{"kk":"<strong>«Айқап» журналы</strong> (1911-1917) – тұңғыш ұлттық журнал.","en":"<strong>\"Aiqap\" magazine</strong> (1911–1917) — the first national magazine."},{"kk":"<strong>«Қазақ» газеті</strong> (1913-1918) – тұңғыш жалпыұлттық қоғамдық-саяси газет.","en":"<strong>\"Qazaq\" newspaper</strong> (1913–1918) — the first nationwide socio-political newspaper."},{"kk":"<strong>Газет-журналдар:</strong> «Абай» (1918), «Шолпан» (1922), «Еңбекші қазақ» (1923-1932).","en":"<strong>Newspapers and magazines:</strong> \"Abai\" (1918), \"Sholpan\" (1922), and \"Engbekshi Qazaq\" (1923–1932)."}]}]},{"heading":"Халықаралы ттық ресурстардың қалыптасуы","headingEn":"Formation of Information Resources","intro":null,"items":[{"kk":"<strong>Бастауы:</strong> Ұлттық кітапхана елімізде алғашқылардың бірі болып <strong>1989 жылдан</strong> бастап ақпараттық ресурстарды қалыптастыра бастады.","en":"<strong>Origins:</strong> the National Library was among the first in the country to begin forming information resources, starting in <strong>1989</strong>."},{"kk":"<strong>Автоматтандыру:</strong> Кітапханалық жұмыс үдерістерін автоматтандыру мақсатында отандық <strong>Web-РАБИС</strong> (Республикалық автоматтандырылған кітапханалық-ақпараттық жүйе) бағдарламасы енгізілген.","en":"<strong>Automation:</strong> the domestic <strong>Web-RABIS</strong> (Republican Automated Library-Information System) software was introduced to automate library workflows."}]},{"heading":"Цифрлық базалар мен каталогтар","headingEn":"Digital databases and catalogs","intro":"Web-РАБИС жүйесінің базасында қазақ, орыс және шет тілдерінде келесі ресурстар жасақталады:","introEn":"Based on the Web-RABIS system, the following resources are created in Kazakh, Russian, and foreign languages:","items":[{"kk":"Электронды каталогтар мен электронды кітапханалар.","en":"Electronic catalogs and electronic libraries."},{"kk":"<strong>«Қазақстан кітаптары»</strong> электронды каталогы (ЭК).","en":"The <strong>\"Books of Kazakhstan\"</strong> electronic catalog (EC)."},{"kk":"<strong>«Қазақстан: өткені мен бүгіні»</strong> дерекқоры (ДҚ).","en":"The <strong>\"Kazakhstan: Past and Present\"</strong> database (DB)."}]},{"heading":"Библиографиялық басылымдар","headingEn":"Bibliographic publications","intro":null,"items":[{"kk":"<strong>Ағымдағы көрсеткіш:</strong> «Қазақстан туралы жаңа әдебиеттер» библиографиялық көрсеткіші.","en":"<strong>Current index:</strong> the \"New Literature about Kazakhstan\" bibliographic index."},{"kk":"<strong>Шығу тарихы: 1966 жылдан</strong> бастап тұрақты жарық көріп келеді.","en":"<strong>Publication history:</strong> published regularly <strong>since 1966</strong>."},{"kk":"<strong>Тілдері мен мерзімділігі:</strong> Қазақ, орыс және ағылшын тілдерінде <strong>жылына 2 рет</strong> басылып шығарылады.","en":"<strong>Languages and frequency:</strong> published in Kazakh, Russian, and English, <strong>twice a year</strong>."}]}],"stats":[{"value":"1989","valueEn":"1989","label":"бастау жылы","labelEn":"founding year"}]},{"num":13,"icon":"link","title":"Қазақстандық Корпоративтік каталогтау орталығы","titleEn":"Kazakhstan Corporate Cataloging Center","blocks":[{"heading":"Қазақстандық Корпоративтік каталогтау орталығы (ҚҚКО)","headingEn":"Kazakhstan Corporate Cataloging Center (KCCC)","intro":null,"items":[{"kk":"<strong>Құрылған жылы:</strong> 2002 жылы құрылды.","en":"<strong>Founded:</strong> established in 2002."},{"kk":"<strong>Басты мақсаты:</strong> Компьютерлік және телекоммуникациялық технологиялар арқылы бірыңғай ақпараттық ресурсты қалыптастыру және оған еркін қолжетімділікті қамтамасыз ету.","en":"<strong>Main goal:</strong> to form a unified information resource through computer and telecommunications technologies, and to ensure free access to it."}]},{"heading":"Ынтымақтастық пен жұмыс механизмі","headingEn":"Cooperation and operating mechanism","intro":null,"items":[{"kk":"<strong>Құқықтар мен міндеттер:</strong> Ынтымақтастық туралы келісімшарт негізінде реттеледі.","en":"<strong>Rights and obligations:</strong> governed under a cooperation agreement."},{"kk":"<strong>Ақпарат алмасу:</strong> Ұлттық кітапхана қатысушыларға <strong>«Қазақстантану»</strong> корпоративтік электрондық каталогынан библиографиялық жазбаларды көшіру үшін арнайы нұсқаулық, логин және пароль береді.","en":"<strong>Information exchange:</strong> the National Library issues participants special instructions, a login, and a password to copy bibliographic records from the <strong>\"Qazaqstantanu\"</strong> corporate electronic catalog."}]},{"heading":"ҚҚКО қатысушылары","headingEn":"KCCC members","intro":"Орталыққа жалпы саны <strong>145 кітапхана</strong> қатысады. Олардың құрамында:","introEn":"A total of <strong>145 libraries</strong> participate in the center, including:","items":[{"kk":"Облыстық әмбебап ғылыми кітапханалар.","en":"Regional universal scientific libraries."},{"kk":"Орталықтандырылған кітапханалар жүйесі.","en":"Centralized library systems."},{"kk":"Балалар мен жасөспірімдер кітапханалары.","en":"Children's and youth libraries."},{"kk":"Зағип және нашар көретін азаматтарға арналған арнайы кітапханалар.","en":"Special libraries for the blind and visually impaired."}]}],"stats":[{"value":"145","valueEn":"145","label":"кітапхана-мүше","labelEn":"member libraries"},{"value":"2002","valueEn":"2002","label":"құрылған жылы","labelEn":"founding year"}]},{"num":14,"icon":"graduation","title":"Каталогизатор мектебі","titleEn":"School of Cataloguers","blocks":[{"heading":"Каталогизатор мектебі","headingEn":"School of Cataloguers","intro":null,"items":[{"kk":"<strong>Анықтамасы:</strong> ҚР Ұлттық кітапханасы жанындағы кәсіби білім беру алаңы.","en":"<strong>Definition:</strong> a professional training platform operating under the National Library of the Republic of Kazakhstan."},{"kk":"<strong>Құрылған уақыты:</strong> 2016 жылдан бері қызмет көрсетіп келеді.","en":"<strong>Established:</strong> in operation since 2016."},{"kk":"<strong>Бағыты:</strong> Кітапханашылардың каталогтау және библиографиялық өңдеу саласындағы біліктілігін арттыру.","en":"<strong>Focus:</strong> upgrading librarians' skills in cataloging and bibliographic processing."}]},{"heading":"Оқу бағдарламасы мен процесі","headingEn":"Curriculum and process","intro":null,"items":[{"kk":"<strong>Үйретілетін бағыттар:</strong> Ұлттық және халықаралық стандарттар, библиографиялық сипаттама, құжаттарды өңдеу және Web-RABIS автоматтандырылған жүйесімен жұмыс.","en":"<strong>Topics taught:</strong> national and international standards, bibliographic description, document processing, and working with the Web-RABIS automated system."},{"kk":"<strong>Процесс құрылымы:</strong> Дәрістер, практикалық сабақтар, кеңестер және кітапхана құрылымымен танысу экскурсиялары.","en":"<strong>Program structure:</strong> lectures, practical sessions, consultations, and orientation tours of the library's structure."}]},{"heading":"Тыңдаушылар құрамы мен статистикасы","headingEn":"Participant profile and statistics","intro":null,"items":[{"kk":"<strong>Мақсатты аудитория:</strong> Машинамен оқитын каталогтаумен айналысатын кітапханалар, көпшілік кітапханалар, ЖОО, архивтер, мұражайлар мен баспа мамандары.","en":"<strong>Target audience:</strong> libraries doing machine-readable cataloging, public libraries, universities, archives, museums, and publishing specialists."},{"kk":"<strong>Жылдық көрсеткіш:</strong> Жыл сайын орта есеппен <strong>155 маман</strong> оқу курстарынан өтеді.","en":"<strong>Annual figure:</strong> on average <strong>155 specialists</strong> complete the training courses each year."},{"kk":"<strong>Нәтиже (2016-2025 жж.):</strong> Мектепте <strong>12 680 маман</strong> білім алды.","en":"<strong>Results (2016–2025):</strong> <strong>12,680 specialists</strong> have trained at the school."}]},{"heading":"Маңызы","headingEn":"Significance","intro":null,"items":[{"kk":"Елімізде бірыңғай кәсіби стандарт қалыптастыруға ықпал етеді.","en":"Contributes to establishing a unified professional standard nationwide."},{"kk":"Кітапхана кадрларының біліктілігін арттырып, салалық ынтымақтастықты нығайтады.","en":"Raises the qualifications of library staff and strengthens cooperation across the sector."}]}],"stats":[{"value":"155","valueEn":"155","label":"маман/жыл","labelEn":"specialists/year"},{"value":"12 680","valueEn":"12,680","label":"түлек (2016–2025)","labelEn":"graduates (2016–2025)"}]},{"num":15,"icon":"scan","title":"Құжаттарды цифрлау орталығы","titleEn":"Document Digitization Center","blocks":[{"heading":"Құжаттарды цифрлау орталығы","headingEn":"Document Digitization Center","intro":null,"items":[{"kk":"<strong>Құрылуы:</strong> 2007 жылы Цифрлық технологиялар қызметі, ал 2013 жылы Үкімет қаулысымен Құжаттарды цифрландыру орталығы құрылды.","en":"<strong>Establishment:</strong> the Digital Technologies Service was created in 2007, and the Document Digitization Center was established in 2013 by government resolution."},{"kk":"<strong>Басты мақсаты:</strong> Ұлттық баспа қорының электрондық көшірмелерін жасау арқылы олардың сақталуын қамтамасыз ету.","en":"<strong>Main goal:</strong> to preserve the national print collection by creating electronic copies of it."}]},{"heading":"Цифрланатын құжаттардың сипаты","headingEn":"Nature of digitized documents","intro":"Орталықта тарихи-мәдени және ғылыми құндылығы бар келесі басылымдар цифрланады:","introEn":"The center digitizes the following publications of historical, cultural, and scientific value:","items":[{"kk":"Ерекше сақтауды талап ететін сирек басылымдар.","en":"Rare publications requiring special preservation."},{"kk":"Әдебиеттің әлеуметтік маңызды түрлері мен қазақ тіліндегі кітаптар.","en":"Socially significant types of literature and books in the Kazakh language."},{"kk":"Жалғыз данадағы басылымдар.","en":"Publications that exist in a single copy."},{"kk":"<strong>Авторлық құқық:</strong> Шығармалар авторлармен арнайы Авторлық келісімшартқа отыру арқылы цифрлық форматқа көшіріледі.","en":"<strong>Copyright:</strong> works are converted to digital format under a special copyright agreement signed with the authors."}]},{"heading":"Техникалық жабдықталуы","headingEn":"Technical equipment","intro":"Құжаттар жоғары сапада әрі бірыңғай форматта ұзақ мерзімге сақталу үшін кәсіби кітап сканерлері қолданылады:","introEn":"Professional book scanners are used so documents are preserved long-term in high quality and a uniform format:","items":[{"kk":"<strong>Үлкен форматты:</strong> SMA SCAN MASTER 1.","en":"<strong>Large-format:</strong> SMA SCAN MASTER 1."},{"kk":"<strong>Кәсіби:</strong> Microbox book2net kiosk.","en":"<strong>Professional:</strong> Microbox book2net kiosk."},{"kk":"<strong>Планшетті:</strong> Epson WorkForce DS-50000.","en":"<strong>Flatbed:</strong> Epson WorkForce DS-50000."}]},{"heading":"Жұмыс нәтижесі мен статистика","headingEn":"Results and statistics","intro":null,"items":[{"kk":"<strong>Жылдық көрсеткіш:</strong> Жыл сайын <strong>10 мыңнан астам</strong> құжат цифрланады.","en":"<strong>Annual figure:</strong> more than <strong>10,000</strong> documents are digitized every year."},{"kk":"<strong>ҚазҰЭК-пен байланыс:</strong> Қазақстандық ұлттық электронды кітапхана қорына жыл сайын <strong>1000-нан аса</strong> құжат жүктеледі.","en":"<strong>Connection with KazNEL:</strong> more than <strong>1,000</strong> documents are uploaded to the Kazakhstan National Electronic Library each year."},{"kk":"<strong>Жалпы нәтиже:</strong> Бүгінгі таңда <strong>125 мыңнан астам</strong> қазақстандық басылым цифрлық форматқа көшірілді.","en":"<strong>Overall result:</strong> to date, more than <strong>125,000</strong> Kazakhstani publications have been converted to digital format."}]}],"stats":[{"value":"10 000+","valueEn":"10,000+","label":"құжат/жыл","labelEn":"documents/year"},{"value":"125 000+","valueEn":"125,000+","label":"жалпы цифрланған","labelEn":"total digitized"},{"value":"1000+","valueEn":"1,000+","label":"ҚазҰЭК-ке жыл сайын","labelEn":"to KazNEL per year"}]},{"num":16,"icon":"shield","title":"Кітапхана қорын сақтау орталығы","titleEn":"Library Collection Preservation Center","blocks":[{"heading":"Кітапхана қорын сақтау орталығы","headingEn":"Library Collection Preservation Center","intro":null,"items":[{"kk":"<strong>Құрылған жылы:</strong> 1999 жылы ҚР Ұлттық кітапханасында құрылды.","en":"<strong>Founded:</strong> established in 1999 at the National Library of the Republic of Kazakhstan."},{"kk":"<strong>Маңызы:</strong> Қазақстандағы жазба мәдени мұраны сақтаудың негізгі бағыттарын айқындайтын ең алғашқы құрылым.","en":"<strong>Significance:</strong> the first body in Kazakhstan to define the main directions for preserving the country's written cultural heritage."}]},{"heading":"Ғылыми консервация зертханасы","headingEn":"Scientific Conservation Laboratory","intro":null,"items":[{"kk":"<strong>Құрылған жылы:</strong> 2001 жылы ашылды.","en":"<strong>Founded:</strong> opened in 2001."},{"kk":"<strong>Қызметі:</strong> Құжаттарды ғылыми консервациялау және реставрациялау саласындағы негізгі әдістерді енгізді.","en":"<strong>Function:</strong> introduced core methods in the scientific conservation and restoration of documents."},{"kk":"<strong>Қайта құрылуы:</strong> Кейіннен «Консервация, қалпына келтіру және түптеу қызметі» болып өзгертілді.","en":"<strong>Reorganization:</strong> later renamed the \"Conservation, Restoration, and Binding Service.\""}]}],"stats":[{"value":"1999","valueEn":"1999","label":"құрылған жылы","labelEn":"founding year"}]},{"num":17,"icon":"flask","title":"Ғылыми консервация зертханасы","titleEn":"Scientific Conservation Laboratory","blocks":[{"heading":"Ғылыми консервация зертханасы","headingEn":"Scientific Conservation Laboratory","intro":null,"items":[{"kk":"<strong>Жұмыс тәжірибесі:</strong> Ширек ғасырдан астам уақыт бойы құжаттардың сақталуы мен беріктігін қамтамасыз етіп келеді.","en":"<strong>Experience:</strong> for over a quarter of a century, it has ensured the preservation and durability of documents."},{"kk":"<strong>Зерттеу жұмыстары (қалпына келтіру алдындағы):</strong>","en":"<strong>Pre-restoration research:</strong>","sub":[{"kk":"рН деңгейін анықтау.","en":"Determining pH level."},{"kk":"Ағаш массасын анықтау.","en":"Detecting wood-pulp content."},{"kk":"Талшықтардың құрамын талдау.","en":"Analyzing fiber composition."}]}]},{"heading":"Атқарылатын негізгі процестер","headingEn":"Main processes performed","intro":"Құжаттарды қорғау мақсатында келесі ғылыми шаралар жүргізіледі:","introEn":"The following scientific measures are carried out to protect documents:","items":[{"kk":"Биологиялық және физика-химиялық тұрақтандыру.","en":"Biological and physico-chemical stabilization."},{"kk":"Бейтараптандыру және парақ беттерін қалпына келтіру.","en":"Neutralization and restoration of pages."},{"kk":"Кітап блоктарын өңдеу мен мұқаба қаптамаларын қайта өңдеу.","en":"Processing book blocks and reworking cover bindings."}]},{"heading":"Жұмыс нәтижесі мен статистика","headingEn":"Results and statistics","intro":null,"items":[{"kk":"<strong>Жылдық көрсеткіш:</strong> Жыл сайын <strong>2 500-ден астам</strong> басылым қалпына келтіріледі.","en":"<strong>Annual figure:</strong> more than <strong>2,500</strong> publications are restored each year."},{"kk":"<strong>Қалпына келтірілетін құжат түрлері:</strong> Кітаптар, қолжазбалар, газет-журналдар, географиялық карталар және диссертациялар.","en":"<strong>Types of documents restored:</strong> books, manuscripts, newspapers and magazines, geographic maps, and dissertations."}]}],"stats":[{"value":"2 500+","valueEn":"2,500+","label":"басылым/жыл","labelEn":"publications/year"}]},{"num":18,"icon":"network","title":"IFLA/PAC өңірлік орталығы","titleEn":"IFLA/PAC Regional Center","blocks":[{"heading":"IFLA/PAC өңірлік орталығы","headingEn":"IFLA/PAC Regional Center","intro":null,"items":[{"kk":"<strong>Мәртебесі:</strong> Халықаралық кітапханалық қауымдастықтар мен мекемелер федерациясының (IFLA/PAC) «Сақтау және консервация» негізгі бағдарламасының Орталық Азия бойынша аймақтық орталығы.","en":"<strong>Status:</strong> the Central Asian regional center for the \"Preservation and Conservation\" core program of the International Federation of Library Associations and Institutions (IFLA/PAC)."},{"kk":"<strong>Қамтитын аймағы:</strong> Қазақстан, Қырғызстан, Тәжікстан, Түркіменстан және Өзбекстан.","en":"<strong>Coverage area:</strong> Kazakhstan, Kyrgyzstan, Tajikistan, Turkmenistan, and Uzbekistan."},{"kk":"<strong>Халықаралық мәртебесі:</strong> 2020 жылы құжаттарды физикалық-химиялық тұрақтандыру саласындағы ресми сарапшы мәртебесіне ие болды.","en":"<strong>International status:</strong> in 2020 it received official expert status in the physico-chemical stabilization of documents."}]},{"heading":"Атқарылатын негізгі жұмыстар","headingEn":"Main activities carried out","intro":"Орталық қорды ұзақ мерзімді сақтау және қалпына келтіру бойынша келесі шараларды тұрақты өткізеді:","introEn":"The center regularly organizes the following activities on long-term collection preservation and restoration:","items":[{"kk":"Семинар-тренингтер.","en":"Seminar-trainings."},{"kk":"Тағылымдамалар мен тәжірибе алмасулар.","en":"Internships and experience exchanges."},{"kk":"Арнайы шеберлік сабақтары (мастер-кластар).","en":"Special skill-building sessions (master classes)."}]}],"stats":[{"value":"5","valueEn":"5","label":"ел қамтуы","labelEn":"countries covered"},{"value":"2020","valueEn":"2020","label":"сарапшы мәртебесі","labelEn":"expert status granted"}]},{"num":19,"icon":"tool","title":"Жазба құжаттарын консервациялау және қалпына келтіру мектебі","titleEn":"School for the Conservation and Restoration of Written Documents","blocks":[{"heading":"Жазба құжаттарын консервациялау және қалпына келтіру мектебі","headingEn":"School for the Conservation and Restoration of Written Documents","intro":null,"items":[{"kk":"<strong>Құрылған жылы:</strong> 2013 жылы кітапхана жанында ашылды.","en":"<strong>Founded:</strong> opened at the library in 2013."},{"kk":"<strong>Маңызы:</strong> Еліміздегі жазба құжаттарды қалпына келтіру бойынша <strong>жалғыз мектеп</strong>.","en":"<strong>Significance:</strong> the country's <strong>only school</strong> for the restoration of written documents."},{"kk":"<strong>Қамту аймағы:</strong> Тек Қазақстан үшін ғана емес, бүкіл <strong>Орталық Азия аймағы</strong> үшін жұмыс істейді.","en":"<strong>Coverage:</strong> serves not only Kazakhstan but the entire <strong>Central Asian regi const ICON = (name)=>`<svg><use href="#i-${name}"/></svg>`;

let lang = 'kk';

function tr(obj){ return lang === 'en' ? (obj.en !== undefined ? obj.en : obj.kk) : obj.kk; }

function renderList(items){
  return items.map(it=>{
    const text = lang === 'en' ? (it.en !== undefined ? it.en : it.kk) : it.kk;
    const sub = it.sub && it.sub.length ? `<ul class="sub-list">${it.sub.map(s=>`<li>${lang==='en'?(s.en!==undefined?s.en:s.kk):s.kk}</li>`).join('')}</ul>` : '';
    return `<li>${text}${sub}</li>`;
  }).join('');
}

function renderCards(blocks, icon){
  const n = blocks.length;
  let colsClass = '';
  if(n === 1) colsClass = 'cols-1';
  else if(n === 3 || n === 5 || n === 6) colsClass = 'cols-3';
  return `<div class="cards ${colsClass}">` + blocks.map(b=>{
    const headingText = b.heading ? (lang==='en' ? (b.headingEn||b.heading) : b.heading) : '';
    const head = b.heading ? `<div class="card-head"><div class="card-icon">${ICON(icon||'bookmark')}</div><h3 class="card-heading">${headingText}</h3></div>` : '';
    const introText = b.intro ? (lang==='en' ? (b.introEn||b.intro) : b.intro) : '';
    const intro = b.intro ? `<p class="card-intro">${introText}</p>` : '';
    const list = b.items && b.items.length ? `<ul class="card-list">${renderList(b.items)}</ul>` : '';
    return `<div class="card">${head}${intro}${list}</div>`;
  }).join('') + `</div>`;
}

function renderStats(stats){
  if(!stats || !stats.length) return '';
  return `<div class="stats-row">` + stats.map(s=>{
    const val = lang==='en' ? (s.valueEn||s.value) : s.value;
    const lbl = lang==='en' ? (s.labelEn||s.label) : s.label;
    return `<div class="stat-pill"><div class="num">${val}</div><div class="lbl">${lbl}</div></div>`;
  }).join('') + `</div>`;
}

function donutSVG(segments, size=180){
  const total = segments.reduce((a,s)=>a+s.value,0);
  const r = size/2 - 12;
  const c = size/2;
  const circumference = 2*Math.PI*r;
  let offset = 0;
  const colors = ['#9ff6e8','#58c4e0','#f3d98a','#ef9f76'];
  let circles = '';
  segments.forEach((s,i)=>{
    const frac = s.value/total;
    const len = frac*circumference;
    circles += `<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="20" stroke-dasharray="${len} ${circumference-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${c} ${c})" stroke-linecap="butt"/>`;
    offset += len;
  });
  const legend = segments.map((s,i)=>{
    const pct = Math.round(s.value/total*100);
    const lbl = lang==='en' ? (s.labelEn||s.label) : s.label;
    return `<div class="item"><span class="swatch" style="background:${colors[i%colors.length]}"></span><span>${lbl} — <strong>${pct}%</strong></span></div>`;
  }).join('');
  return `<div class="chart-row">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="20"/>
      ${circles}
    </svg>
    <div class="donut-legend">${legend}</div>
  </div>`;
}

function barsSVG(items){
  const max = Math.max(...items.map(i=>i.value));
  return `<div class="bars">` + items.map(it=>{
    const pct = Math.round(it.value/max*100);
    const lbl = lang==='en' ? (it.labelEn||it.label) : it.label;
    const disp = lang==='en' ? (it.displayEn||it.display||it.value) : (it.display||it.value);
    return `<div class="bar-row"><div class="meta"><span>${lbl}</span><span><strong style="color:var(--accent)">${disp}</strong></span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
  }).join('') + `</div>`;
}

function renderChart(chart){
  if(!chart) return '';
  let inner = '';
  if(chart.type === 'donut') inner = donutSVG(chart.segments, chart.size||180);
  if(chart.type === 'bars') inner = barsSVG(chart.items);
  const title = chart.title ? (lang==='en' ? (chart.titleEn||chart.title) : chart.title) : '';
  return `<div class="chart-wrap">${title?`<h3 class="card-heading">${title}</h3>`:''}${inner}</div>`;
}

function renderContactRow(c){
  const labelHtml = c.label ? `<span class="vc-label">${tr(c.label)}</span>` : '';
  const value = (c.value && typeof c.value === 'object') ? tr(c.value) : c.value;
  const inner = `<div class="card-icon">${ICON(c.icon)}</div><div class="vc-text">${labelHtml}<span class="vc-value">${value}</span></div>`;
  const cls = `vc-row${c.wide ? ' vc-address' : ''}`;
  if(c.href){
    const isExternal = c.href.indexOf('http') === 0;
    return `<a class="${cls}" href="${c.href}"${isExternal?' target="_blank" rel="noopener"':''}>${inner}${isExternal?`<div class="vc-go">${ICON('external')}</div>`:''}</a>`;
  }
  return `<div class="${cls}">${inner}</div>`;
}

function renderVisitCard(){
  const directorRow = `
    <div class="vc-director">
      <div class="vc-avatar">${ICON('user')}</div>
      <div class="vc-director-info">
        <div class="vc-director-name">${CONTACT.director.name}</div>
        <div class="vc-director-role">${tr(CONTACT.director.role)}</div>
      </div>
      <a class="vc-director-link" href="${CONTACT.director.href}" target="_blank" rel="noopener">${ICON('facebook')}<span>${tr(CONTACT.director.linkLabel)}</span></a>
    </div>`;
  const onlineRows = CONTACT.online.map(o=>renderContactRow(o)).join('');
  const addressRow = renderContactRow(Object.assign({}, CONTACT.address, {wide:true}));
  const emailRows = CONTACT.emails.map(e=>renderContactRow(e)).join('');
  const phoneRows = CONTACT.phones.map(p=>renderContactRow(p)).join('');
  return `<div class="visit-card">
      ${directorRow}
      <div class="vc-divider"></div>
      <div class="vc-grid">${onlineRows}${addressRow}${emailRows}${phoneRows}</div>
    </div>`;
}

function renderSlide(slide, idx, total){
  if(slide.type === 'cover'){
    return `<section class="slide cover" id="slide-${idx}">
      <div class="slide-inner">
        <div class="icon-badge">${ICON('library')}</div>
        <div class="cover-org">${tr(slide.org)}</div>
        <h1 class="slide-title">${tr(slide.title)}</h1>
        <p class="slide-sub">${tr(slide.sub)}</p>
        ${renderVisitCard()}
        <div class="cover-meta">${slide.chips.map(c=>`<div class="meta-chip">${tr(c)}</div>`).join('')}</div>
      </div>
    </section>`;
  }
  if(slide.type === 'closing'){
    return `<section class="slide closing" id="slide-${idx}">
      <div class="slide-inner">
        <div class="icon-badge">${ICON(slide.icon)}</div>
        <h1 class="slide-title">${tr(slide.title)}</h1>
        <p class="slide-sub">${tr(slide.sub)}</p>
        <div class="cover-meta">${slide.chips.map(c=>`<div class="meta-chip">${tr(c)}</div>`).join('')}</div>
      </div>
    </section>`;
  }
  const titleText = lang === 'en' ? slide.titleEn : slide.title;
  return `<section class="slide" id="slide-${idx}">
    <div class="page-badge">${String(slide.num).padStart(2,'0')} / ${String(total-2).padStart(2,'0')}</div>
    <div class="slide-inner">
      <div class="slide-header">
        <div class="icon-badge">${ICON(slide.icon)}</div>
        <div class="slide-eyebrow">${lang==='en'?EYEBROW.en:EYEBROW.kk}</div>
        <h2 class="slide-title">${titleText}</h2>
      </div>
      ${renderStats(slide.stats)}
      ${renderChart(slide.chart)}
      ${renderCards(slide.blocks, slide.icon)}
    </div>
  </section>`;
}

const ALL = [COVER, ...SLIDES, CLOSING];
const deck = document.getElementById('deck');
const counter = document.getElementById('counter');
const progressBar = document.getElementById('progressBar');
let current = 0;
let slideEls = [];

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      current = slideEls.indexOf(entry.target);
      updateCounter();
    }
  });
},{root: deck, threshold:0.6});

function updateCounter(){
  counter.textContent = `${current+1} / ${slideEls.length}`;
  progressBar.style.width = `${(current)/(slideEls.length-1)*100}%`;
}

function goTo(i){
  i = Math.max(0, Math.min(slideEls.length-1, i));
  slideEls[i].scrollIntoView({behavior:'smooth', block:'start'});
}

function buildDeck(restoreIndex){
  const idxToRestore = restoreIndex !== undefined ? restoreIndex : current;
  deck.innerHTML = ALL.map((s,i)=>renderSlide(s,i,ALL.length+2)).join('');
  slideEls = Array.from(document.querySelectorAll('.slide'));
  observer.disconnect();
  slideEls.forEach(el=>observer.observe(el));
  current = Math.max(0, Math.min(slideEls.length-1, idxToRestore));
  updateCounter();
  slideEls[current].scrollIntoView({behavior:'auto', block:'start'});
}

document.getElementById('prevBtn').addEventListener('click',()=>goTo(current-1));
document.getElementById('nextBtn').addEventListener('click',()=>goTo(current+1));
window.addEventListener('keydown',(e)=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){ e.preventDefault(); goTo(current+1); }
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){ e.preventDefault(); goTo(current-1); }
});

function setLang(newLang){
  if(lang === newLang) return;
  lang = newLang;
  document.documentElement.lang = lang;
  document.title = lang==='en' ? 'National Library of Kazakhstan — Presentation' : 'ҚР Ұлттық кітапханасы — Презентация';
  document.querySelectorAll('.lang-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  buildDeck(current);
}

document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> setLang(btn.dataset.lang));
});

buildDeck(0);
</script></body></html>
